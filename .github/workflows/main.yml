name: Build Static Node.js

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm  # GitHub 托管的 arm64 runner
    
    container:
      image: alpine:latest
    
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache python3 g++ make linux-headers git curl musl-dev
      
      - name: Download Node.js source
        run: |
          curl -fsSLO https://nodejs.org/dist/node-latest.tar.gz
          mkdir -p node-latest
          tar -xzf node-latest.tar.gz -C node-latest --strip-components=1
      
      - name: Configure and build
        working-directory: node-latest
        run: |
          ./configure \
            --prefix=/usr \
            --dest-cpu=${{ matrix.arch }} \
            --dest-os=linux \
            --fully-static
          make
          strip out/Release/node
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-static-${{ matrix.arch }}
          path: node-latest/out/Release/node
